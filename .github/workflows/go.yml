name: Go

on: 
  workflow_call:

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
      with:
        go-version: stable
        cache: ${env.go-cache}
    - name: Verify
      run: go mod verify
    - name: Install gofumpt
      run: go install mvdan.cc/gofumpt@v0.9.2
    - name: Check formating
      run: gofumpt -d ./
    - name: Install staticcheck
      run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
    - name: Install errcheck
      run: go install github.com/kisielk/errcheck@v1.10.0
    - name: golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 #v9.2.0
      with:
          version: v2.11.2
    - name: Install revive
      run: go install github.com/mgechev/revive@v1.15.0     
    - name: Install go-critic
      run: go install -v github.com/go-critic/go-critic/cmd/go-critic@v0.14.3 
    - name: Check
      run: |
        golangci-lint run ./...
        staticcheck
        errcheck
        revive -config revive.toml -formatter friendly ./...
        go-critic check -@ifElseChain.minThreshold=4 -enable='octalLiteral,yodaStyleExpr,zeroByteRepeat,badSorting,builtinShadow,commentFormatting' ./...
      
  build-linux:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest]
        platform: [64, 86]
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
      with:
        go-version: stable
        cache: ${env.go-cache}
    - name: Verify
      run: go mod verify
    - name: Test
      run: go test -v ./...
    - name: Build
      run: go build -v ./...
    - name: Build Artifact
      run: go build -v .
    - name: Create Zip
      run: zip ./dreamdump-${{env.release_name}}_linux_${{matrix.platform}}.zip ./dreamdump
    - name: Upload Artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
      with:
        name: dreamdump-${{env.release_name}}_linux_${{matrix.platform}}
        path: ./dreamdump-${{env.release_name}}_linux_${{matrix.platform}}.zip

  build-windows7:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest]
        platform: [64, 86]
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
    - name: Setup Win7 Go
      run: |
        export FILE=go-legacy-win7-1.26.5-1.linux_amd64.tar.gz
        wget https://github.com/thongtech/go-legacy-win7/releases/download/v1.26.5-1/go-legacy-win7-1.26.5-1.linux_amd64.tar.gz
        echo "4204dcd95218f61f4ffee51d0deef05a227228ae1f494755e855414271d7c4af $FILE" | sha256sum -c
        sudo tar -C /usr/local -xzf $FILE
        export GOROOT=/usr/local/go-legacy-win7
        export GOPATH=$HOME/go
        export PATH=$PATH:$GOROOT/bin:$GOPATH/bin
        /usr/local/go-legacy-win7/bin/go env -w GOTOOLCHAIN=local
    - name: Test
      run: /usr/local/go-legacy-win7/bin/go test -v ./...
    - name: Build
      run: GOOS=windows /usr/local/go-legacy-win7/bin/go build -v ./...
    - name: Build Artifact
      run: GOOS=windows /usr/local/go-legacy-win7/bin/go build -v .
    - name: Create Zip
      run: zip ./dreamdump-${{env.release_name}}_win7_${{matrix.platform}}.zip ./dreamdump.exe
    - name: Upload Artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
      with:
        name: dreamdump-${{env.release_name}}_win7_${{matrix.platform}}
        path: ./dreamdump-${{env.release_name}}_win7_${{matrix.platform}}.zip

  build-windows:
    needs: lint
    strategy:
      matrix:
        os: [windows-2022]
        platform: [64, 86]
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
      with:
        go-version: stable
        cache: ${env.go-cache}
    - name: Verify
      run: go mod verify
    - name: Test
      run: go test -v ./...
    - name: Build
      run: go build -v ./...
    - name: Build Artifact
      run: go build -v .
    - name: Create Zip
      run: Compress-Archive -Path ./dreamdump.exe -DestinationPath dreamdump-${{env.release_name}}_win_${{matrix.platform}}.zip
    - name: Upload Artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
      with:
        name: dreamdump-${{env.release_name}}_win_${{matrix.platform}}
        path: ./dreamdump-${{env.release_name}}_win_${{matrix.platform}}.zip